name: Docker Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build backend image
        run: docker build -t devops-project-backend ./backend

      - name: Build frontend image
        run: docker build -t devops-project-frontend ./front
